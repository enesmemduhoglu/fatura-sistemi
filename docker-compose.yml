# Uygulama + PostgreSQL. ${...} değerleri çalıştıran makinedeki .env dosyasından
# okunur (docker compose bunu otomatik yapar); bu dosyada gizli değer tutulmaz.
services:
  db:
    image: postgres:17
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 3s
      retries: 10

  web:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
    ports:
      - "8080:8080"
    volumes:
      # Fatura eki dosyaları konteyner yeniden oluşturulsa da kalıcı olsun
      - appdata:/app/App_Data

volumes:
  pgdata:
  appdata:
