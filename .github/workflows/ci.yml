name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: .NET 8 kurulumu
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Testleri çalıştır
        run: dotnet test Isbasi.Tests --configuration Release --nologo

      - name: Bağımlılık zafiyet taraması
        run: |
          dotnet restore isbasi.sln
          dotnet list isbasi.sln package --vulnerable --include-transitive | tee vulnerable.txt
          # Zafiyet satırları önem derecesi içerir; bulunursa iş başarısız olur
          if grep -qiE '\b(critical|high|moderate|low)\b' vulnerable.txt; then
            echo "Zafiyetli paket bulundu; yukarıdaki listeye bakın."
            exit 1
          fi
