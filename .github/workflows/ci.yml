name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: .NET 8 kurulumu
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Testleri çalıştır
        run: dotnet test Isbasi.Tests --configuration Release --nologo
